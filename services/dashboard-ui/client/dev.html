<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nuon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script>
      // Load runtime config (blocking — must run before app module)
      var x = new XMLHttpRequest()
      x.open('GET', '/__dev/config.js', false)
      x.send()
      if (x.status === 200) new Function(x.responseText)()

      // Check auth via dev server's own proxy (cookie is httpOnly so JS can't read it)
      if (window.__NUON_CONFIG__?.authServiceUrl) {
        var authCheck = new XMLHttpRequest()
        authCheck.open('GET', '/v1/auth/validate', false)
        authCheck.send()
        if (authCheck.status === 401) {
          window.location.href = window.__NUON_CONFIG__.authServiceUrl + '/?url=' + encodeURIComponent(window.location.href)
        }
      }

      // Inject CSS stylesheet
      var link = document.createElement('link')
      link.rel = 'stylesheet'
      link.id = 'dev-css'
      link.href = '/assets/styles.css'
      document.head.appendChild(link)

      // Inject favicon
      var fav = document.createElement('link')
      fav.rel = 'icon'
      fav.href = '/favicon.svg'
      fav.type = 'image/svg+xml'
      document.head.appendChild(fav)

      // Suppress benign ResizeObserver error from @container queries
      window.addEventListener('error', function (e) {
        if (e.message?.includes('ResizeObserver')) e.stopImmediatePropagation()
      })

      // CSS-only hot reload via SSE
      var es = new EventSource('/__dev/css-reload')
      es.onmessage = function () {
        var l = document.getElementById('dev-css')
        if (l) l.href = l.href.split('?')[0] + '?v=' + Date.now()
      }
    </script>
  </head>
  <body class="font-sans disable-ligatures antialiased">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
