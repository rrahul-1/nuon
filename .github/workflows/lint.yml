---
name: lint
"on":
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  issues: read
  packages: write
  pull-requests: write
  statuses: write
  actions: read

concurrency:
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}

defaults:
  run:
    shell: bash

jobs:
  ast-grep:
    name: ast-grep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ast-grep
        run: npm install -g @ast-grep/cli

      - name: Run ast-grep scan
        run: sg scan services/ pkg/ --filter no-fmt-println

  update_status:
    name: update status
    if: github.event_name == 'pull_request' && always()
    runs-on: ubuntu-latest
    needs: [ast-grep]
    steps:
      - name: Update status
        uses: ouzi-dev/commit-status-updater@v2.0.1
        with:
          name: lint ✅
          status: success
