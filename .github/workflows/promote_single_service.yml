---
name: Promote Single Service

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to promote to production'
        required: true
        type: choice
        options:
          - ctl-api
          - dashboard-ui
          - runner
          - cli
      branch:
        description: 'Branch to promote from'
        required: true
        default: 'main'
      skip_post_promotion:
        description: 'Skip post-promotion tasks (SDK updates, homebrew, BYOC)'
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write
  issues: read
  packages: write
  pull-requests: write
  statuses: write
  actions: read

concurrency:
  group: promote-${{ github.event.inputs.service }}-${{ github.event.inputs.branch }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  tag:
    name: Setup promotion
    runs-on: ubuntu-latest
    outputs:
      git_ref: ${{ steps.git_ref.outputs.git_ref }}
      semver: ${{ steps.semver.outputs.nextStrict }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0

      - name: Set git_ref output
        id: git_ref
        run: echo "git_ref=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Determine next version
        id: semver
        uses: ./.github/actions/cross-repo-semver
        with:
          sibling_repo: nuonco/mono
          token: ${{ secrets.PRIVATE_REPO_DEPLOY_TOKEN }}

  start_slack_notifications:
    name: Update promotions channel
    needs:
      - tag
    runs-on: ubuntu-latest
    steps:
      - name: Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_ICON_EMOJI: 🤖
          SLACK_USERNAME: github-bot
          SLACK_WEBHOOK: ${{ secrets.PROMOTIONS_SLACK_WEBHOOK_URL }}
          SLACK_MESSAGE: |
            ⛴  *SINGLE SERVICE PROMOTION* `${{ github.event.inputs.service }}` from branch `${{ github.event.inputs.branch }}` `${{ needs.tag.outputs.git_ref }}` to `${{ needs.tag.outputs.semver }}`
            *version* - ${{ needs.tag.outputs.semver }}
            *service* - ${{ github.event.inputs.service }}
            *triggered by* - ${{ github.actor }}

  service:
    name: 🚢 ${{ github.event.inputs.service }}
    needs:
      - tag
    uses: ./.github/workflows/service.yml
    with:
      service: ${{ github.event.inputs.service }}
      tag: ${{ needs.tag.outputs.semver }}
      prod: true
      stage: false
      is_promotion: true
      disable_github_oidc: true
    secrets: inherit

  lsp:
    name: 🚢 lsp
    needs:
      - tag
    if: ${{ github.event.inputs.service == 'cli' }}
    uses: ./.github/workflows/service.yml
    with:
      service: lsp
      tag: ${{ needs.tag.outputs.semver }}
      prod: true
      stage: false
      is_promotion: true
      disable_github_oidc: true
    secrets: inherit

  bump_tag:
    name: Bump tag
    needs:
      - tag
    runs-on: ubuntu-latest
    steps:
      - name: Push tag
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ needs.tag.outputs.semver }}

  update_statuses:
    name: Update statuses
    needs:
      - tag
      - service
      - lsp
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: martialonline/workflow-status@v4.2
        id: check

      - name: Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_ICON_EMOJI: 🤖
          SLACK_USERNAME: github-bot
          SLACK_WEBHOOK: ${{ secrets.PROMOTIONS_SLACK_WEBHOOK_URL }}
          SLACK_COLOR: ${{ steps.check.outputs.status }}
          SLACK_MESSAGE: |
            ${{ steps.check.outputs.status == 'success' && '🏁🏁' || '🚨🚨' }} *SINGLE SERVICE PROMOTION* finished `${{ github.event.inputs.service }}` from branch `${{ github.event.inputs.branch }}` `${{ needs.tag.outputs.git_ref }}` to `${{ needs.tag.outputs.semver }}`
            *version* - ${{ needs.tag.outputs.semver }}
            *service* - ${{ github.event.inputs.service }}
            *status* - ${{ steps.check.outputs.status }}
            *triggered by* - ${{ github.actor }}

      - name: Update datadog
        uses: masci/datadog@v1
        with:
          api-key: ${{ secrets.DATADOG_API_KEY }}
          api-url: "https://us5.datadoghq.com"
          metrics: |
            - type: "count"
              name: "promotions.count"
              value: 1.0
              host: ${{ github.repository_owner }}
              tags:
                - "branch:${{ github.event.inputs.branch }}"
                - "status:${{ steps.check.outputs.status }}"
                - "version:${{ needs.tag.outputs.semver }}"
                - "service:${{ github.event.inputs.service }}"
                - "type:single-service"
                - "env:prod"

  promote_success:
    name: Promote success
    needs:
      - tag
      - bump_tag
      - service
      - lsp
    if: ${{ !failure() && !cancelled() && !inputs.skip_post_promotion }}
    uses: ./.github/workflows/promote_success.yml
    with:
      tag: ${{ needs.tag.outputs.semver }}
    secrets: inherit
