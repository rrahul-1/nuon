---
name: service
"on":
  workflow_call:
    inputs:
      service:
        type: string
        required: true
      prod:
        type: boolean
        required: true
      stage:
        type: boolean
        required: true
      tag:
        type: string
        required: true
      disable_github_oidc:
        type: boolean
        required: false
        default: true
      is_promotion:
        type: boolean
        required: false
        default: false
    outputs: {}

defaults:
  run:
    shell: bash

jobs:
  # NOTE(jm): I'm not the biggest fan of having this all connected in a single stage, however this ultimately gives us
  # the best performance. This is because each job has it's own runner, and that means loading in our GHA cache each
  # time.
  service:
    name: all
    runs-on: build-only
    timeout-minutes: 30
    env:
      NO_CACHE: ${{ contains(github.event.pull_request.labels.*.name, 'no-cache') }}
      NO_REMOTE_BUILDKIT: ${{ contains(github.event.pull_request.labels.*.name, 'no-remote-buildkit') }}
      DISABLE_GITHUB_OIDC: ${{ inputs.disable_github_oidc }}
      GEN_API_TYPES: ${{ contains(github.event.pull_request.labels.*.name, 'gen-api-types') }}
      # Fork PRs don't push artifacts (security).
      IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
    steps:
      - uses: FranzDiebold/github-env-vars-action@v2

      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup nuonctl
        uses: ./actions/setup-nuonctl

      - name: Setup BuildKit
        if: ${{ env.NO_REMOTE_BUILDKIT != 'true' }}
        run: CI=true nuonctl builds driver ctl-api

      - name: 🔧 Enable local API types generation (dashboard-ui only)
        if: ${{ inputs.service == 'dashboard-ui' && env.GEN_API_TYPES == 'true' }}
        run: |
          echo "Pulling service configs and enabling local API types generation..."
          CI=true nuonctl builds pull-service-configs
          yq -i '(.tests[] | select(.docker_target == "lint")).docker_target = "lint-local-spec"' services/dashboard-ui/service.yml
          yq -i '(.tests[] | select(.docker_target == "test")).docker_target = "test-local-spec"' services/dashboard-ui/service.yml
          echo "Updated service.yml:"
          yq '.tests' services/dashboard-ui/service.yml

      - name: 😎 Tests
        run: |
          CI=true nuonctl tests run-all ${{inputs.service}}

      - name: 📦 Build
        run: |
          CI=true nuonctl builds release \
            ${{inputs.service}} \
            --tag=${{inputs.tag}} \
            --no-cache=${{ env.NO_CACHE == 'true' || inputs.is_promotion }} \
            --push=${{ env.IS_FORK_PR != 'true' }}
        # --write-cache=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        env:
          BUILD_PROMOTION: ${{ inputs.is_promotion }}
          GITHUB_PR_AUTHOR: ${{ github.event.pull_request.user.login }}

      # Services that need k8s charts deploy via mono repo
      - name: ⬆️ Deploy Stage (k8s services)
        if: ${{ inputs.stage && !contains(fromJSON('["runner", "cli", "lsp"]'), inputs.service) }}
        run: |
          gh workflow run deploy-public-services.yml \
            --repo nuonco/mono \
            --field service=${{inputs.service}} \
            --field env=stage \
            --field tag=${{inputs.tag}} \
            --field source_repo=${{ github.repository }} \
            --field source_run_id=${{ github.run_id }} \
            --field source_actor=${{ github.actor }}
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_DEPLOY_TOKEN }}

      - name: 🌎 Deploy Prod (k8s services)
        if: ${{ inputs.prod && !contains(fromJSON('["runner", "cli", "lsp"]'), inputs.service) }}
        run: |
          gh workflow run deploy-public-services.yml \
            --repo nuonco/mono \
            --field service=${{inputs.service}} \
            --field env=prod \
            --field tag=${{inputs.tag}} \
            --field source_repo=${{ github.repository }} \
            --field source_run_id=${{ github.run_id }} \
            --field source_actor=${{ github.actor }}
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_DEPLOY_TOKEN }}

      # Artifacts (runner, cli, lsp) deploy directly via nuonctl - no k8s needed
      - name: ⬆️ Deploy Stage (artifacts)
        if: ${{ inputs.stage && contains(fromJSON('["runner", "cli", "lsp"]'), inputs.service) }}
        run: |
          CI=true nuonctl deploys deploy ${{inputs.service}} --env=stage --tag=${{inputs.tag}}

      - name: 🌎 Deploy Prod (artifacts)
        if: ${{ inputs.prod && contains(fromJSON('["runner", "cli", "lsp"]'), inputs.service) }}
        run: |
          CI=true nuonctl deploys deploy ${{inputs.service}} --env=prod --tag=${{inputs.tag}}

      - name: 💾 Save cache
        run: |
          CI=true nuonctl builds release ${{inputs.service}} --tag=${{inputs.tag}} --push=false --write-cache --max-mode > /tmp/save-cache-build.log 2>&1 &
          BUILD_PID=$!
          CI=true nuonctl tests run-all ${{inputs.service}} --write-cache --max-mode > /tmp/save-cache-tests.log 2>&1 &
          TESTS_PID=$!

          BUILD_RC=0; TESTS_RC=0
          wait $BUILD_PID || BUILD_RC=$?
          wait $TESTS_PID || TESTS_RC=$?

          echo "::group::builds release --write-cache log"
          cat /tmp/save-cache-build.log
          echo "::endgroup::"
          echo "::group::tests run-all --write-cache log"
          cat /tmp/save-cache-tests.log
          echo "::endgroup::"

          if [ $BUILD_RC -ne 0 ] || [ $TESTS_RC -ne 0 ]; then
            echo "save-cache failed: builds=$BUILD_RC tests=$TESTS_RC"
            exit 1
          fi
