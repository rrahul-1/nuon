---
name: check generated code
"on":
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write
  actions: read

concurrency:
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}

defaults:
  run:
    shell: bash

jobs:
  check-generated:
    name: check generated code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Setup nuonctl
        uses: ./actions/setup-nuonctl

      - name: Setup scripts for nuonctl
        run: |
          mkdir -p bins/nuonctl/scripts
          cp -r scripts/* bins/nuonctl/scripts/
          chmod +x bins/nuonctl/scripts/*

      - name: Generate code
        run: |
          CI=true nuonctl scripts reset-generated-code

      - name: Check for uncommitted changes
        run: |
          if ! git diff --exit-code -- sdks/ docs/; then
            echo "::error::Generated code differs from committed code."
            echo "Run './run-nuonctl.sh scripts reset-generated-code' and commit the changes."
            git diff --stat -- sdks/ docs/
            exit 1
          fi
          echo "Generated code is up to date."
