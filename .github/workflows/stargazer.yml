---
name: Stargazer Notification

on:
  watch:
    types: [started]

jobs:
  notify:
    name: Send Slack notification
    runs-on: ubuntu-latest
    steps:
      - name: Fetch user profile and send Slack notification
        env:
          GH_TOKEN: ${{ github.token }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_STARGAZER_WEBHOOK_URL }}
          SENDER_LOGIN: ${{ github.event.sender.login }}
          SENDER_URL: ${{ github.event.sender.html_url }}
          SENDER_AVATAR: ${{ github.event.sender.avatar_url }}
          REPO_NAME: ${{ github.event.repository.full_name }}
          REPO_URL: ${{ github.event.repository.html_url }}
          STAR_COUNT: ${{ github.event.repository.stargazers_count }}
        run: |
          # Fetch full user profile
          USER_DATA=$(gh api users/${SENDER_LOGIN})
          
          # Extract fields safely with jq
          NAME=$(echo "$USER_DATA" | jq -r '.name // empty')
          COMPANY=$(echo "$USER_DATA" | jq -r '.company // empty')
          LOCATION=$(echo "$USER_DATA" | jq -r '.location // empty')
          BIO=$(echo "$USER_DATA" | jq -r '.bio // empty' | tr '\n' ' ')
          BLOG=$(echo "$USER_DATA" | jq -r '.blog // empty')
          TWITTER=$(echo "$USER_DATA" | jq -r '.twitter_username // empty')
          FOLLOWERS=$(echo "$USER_DATA" | jq -r '.followers // 0')
          FOLLOWING=$(echo "$USER_DATA" | jq -r '.following // 0')
          PUBLIC_REPOS=$(echo "$USER_DATA" | jq -r '.public_repos // 0')
          CREATED_AT=$(echo "$USER_DATA" | jq -r '.created_at // empty' | cut -d'T' -f1)
          EMAIL=$(echo "$USER_DATA" | jq -r '.email // empty')
          HIREABLE=$(echo "$USER_DATA" | jq -r '.hireable // false')
          
          # Build message parts using $'...' for actual newlines
          NL=$'\n'
          MSG="⭐ *New GitHub Star!*${NL}${NL}"
          MSG+="*Username:* <${SENDER_URL}|@${SENDER_LOGIN}>${NL}"
          
          [ -n "$NAME" ] && MSG+="*Name:* ${NAME}${NL}"
          [ -n "$BIO" ] && MSG+="*Bio:* ${BIO}${NL}"
          [ -n "$COMPANY" ] && MSG+="*Company:* ${COMPANY}${NL}"
          [ -n "$LOCATION" ] && MSG+="*Location:* 📍 ${LOCATION}${NL}"
          [ -n "$EMAIL" ] && MSG+="*Email:* ${EMAIL}${NL}"
          [ -n "$BLOG" ] && MSG+="*Website:* ${BLOG}${NL}"
          [ -n "$TWITTER" ] && MSG+="*Twitter:* <https://twitter.com/${TWITTER}|@${TWITTER}>${NL}"
          
          MSG+="${NL}*GitHub Stats:*${NL}"
          MSG+="• Followers: ${FOLLOWERS} | Following: ${FOLLOWING}${NL}"
          MSG+="• Public Repos: ${PUBLIC_REPOS}${NL}"
          MSG+="• Member since: ${CREATED_AT}${NL}"
          
          [ "$HIREABLE" = "true" ] && MSG+="• 💼 Open to opportunities${NL}"
          
          MSG+="${NL}---${NL}"
          MSG+="*Repository:* <${REPO_URL}|${REPO_NAME}>${NL}"
          MSG+="*Total Stars:* ⭐ ${STAR_COUNT}"
          
          # Build JSON payload using jq for proper escaping
          PAYLOAD=$(jq -n \
            --arg text "⭐ New GitHub Star from ${SENDER_LOGIN}!" \
            --arg msg "$MSG" \
            --arg avatar "$SENDER_AVATAR" \
            --arg alt "$SENDER_LOGIN" \
            '{
              text: $text,
              blocks: [
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: $msg
                  },
                  accessory: {
                    type: "image",
                    image_url: $avatar,
                    alt_text: $alt
                  }
                }
              ]
            }')
          
          # Send to Slack
          curl -X POST -H 'Content-type: application/json' \
            --data "$PAYLOAD" \
            "$SLACK_WEBHOOK_URL"
